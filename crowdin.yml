project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN

preserve_hierarchy: true

files:
  - source: /description.txt
    translation: /store-assets/%two_letters_code%/description.txt
    dest: /store-assets/description.txt
    languages_mapping: &languages_mapping
      two_letters_code:
        pt-BR: pt-BR
        zh-CN: zh-CN
        zh-TW: zh-TW

  - source: /chrome/screenshots/*
    translation: /store-assets/%two_letters_code%/chrome/screenshots/%original_file_name%
    dest: /store-assets/chrome/screenshots/%original_file_name%
    languages_mapping: *languages_mapping
